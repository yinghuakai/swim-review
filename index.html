  document.getElementById('usedCount').textContent = usedCount;
  
  const el = document.getElementById('reviewText');
  const ph = document.getElementById('placeholder');
  const copyBtn = document.getElementById('copyBtn');
  
  ph.style.display = 'none';
  el.textContent = text;
  el.style.display = 'block';
  
  el.classList.remove('fade-in');
  void el.offsetWidth;
  el.classList.add('fade-in');
  
  copyBtn.style.display = 'flex';
  copyBtn.classList.remove('copied');
  copyBtn.innerHTML = '📋 一键复制好评';
}

async function copyReview() {
  const text = document.getElementById('reviewText').textContent;
  if (!text) return;
  
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = '✅ 已复制！可粘贴使用';
    showToast();
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = '✅ 已复制！可粘贴使用';
    showToast();
  }
}

function showToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

// Generate bubbles
(function createBubbles() {
  const container = document.getElementById('bubbles');
  for (let i = 0; i < 12; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = Math.random() * 16 + 6;
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.left = Math.random() * 100 + '%';
    b.style.bottom = '-' + size + 'px';
    b.style.animationDuration = (Math.random() * 8 + 6) + 's';
    b.style.animationDelay = (Math.random() * 6) + 's';
    container.appendChild(b);
  }
})();

// Update total count
document.getElementById('totalCount').textContent = templates.length + '+';

// Auto generate
setTimeout(generateReview, 600);
</script>
