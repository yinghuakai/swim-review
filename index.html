    max-width: 420px;

    padding: 24px 16px 40px;

    gap: 20px;
    padding: 12px 0 4px;

    text-align: center;

// Track used indices to avoid immediate repeats
let lastIndices = [];
let usedCount = 0;

function generateReview() {
  let idx;
  // Avoid repeating recent ones if possible
  const available = templates.map((_, i) => i).filter(i => !lastIndices.includes(i));
  
  if (available.length > 0) {
    idx = available[Math.floor(Math.random() * available.length)];
  } else {
    // All used recently, pick random and reset
    idx = Math.floor(Math.random() * templates.length);
    lastIndices = [];
  }
  
  lastIndices.push(idx);
  if (lastIndices.length > Math.min(8, templates.length)) {
    lastIndices.shift();
  }
  
  usedCount++;
  document.getElementById('usedCount').textContent = usedCount;
  
  const text = templates[idx];
  const el = document.getElementById('reviewText');
  const ph = document.getElementById('placeholder');
  const copyBtn = document.getElementById('copyBtn');
  
  ph.style.display = 'none';
  el.textContent = text;
  el.style.display = 'block';
  
  // Re-trigger fade animation
  el.classList.remove('fade-in');
  void el.offsetWidth; // force reflow
  el.classList.add('fade-in');
  
  copyBtn.style.display = 'flex';
  copyBtn.classList.remove('copied');
  copyBtn.innerHTML = '📋 一键复制好评';
}

async function copyReview() {
  const text = document.getElementById('reviewText').textContent;
  if (!text) return;
  
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = '✅ 已复制！可粘贴使用';
    
    showToast();
  } catch (e) {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = '✅ 已复制！可粘贴使用';
    showToast();
  }
}

function showToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

// Generate bubbles
(function createBubbles() {
  const container = document.getElementById('bubbles');
  for (let i = 0; i < 12; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = Math.random() * 16 + 6;
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.left = Math.random() * 100 + '%';
    b.style.bottom = '-' + size + 'px';
    b.style.animationDuration = (Math.random() * 8 + 6) + 's';
    b.style.animationDelay = (Math.random() * 6) + 's';
    container.appendChild(b);
  }
})();

// Update total count
document.getElementById('totalCount').textContent = templates.length;

// Auto generate on load for better UX
setTimeout(generateReview, 600);
</script>
